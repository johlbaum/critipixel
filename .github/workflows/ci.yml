name: Continuous Integration
# Le nom du workflow est défini ici comme "Continuous Integration". Ce nom sera visible dans l'interface GitHub sous les workflows et peut être personnalisé pour décrire plus précisément la tâche exécutée.

on:
  push:
    branches: [ ci-setup ]
    # Ce workflow est déclenché lorsqu'un `push` (envoi de modifications) est effectué sur la branche `ci-setup`.
    # Cela signifie que toute modification dans cette branche déclenchera l'exécution de ce pipeline.

jobs: # Dans GitHub Actions, un job est une série de pas (steps) qui s'exécutent dans un même environnement. 
  ci: # Le nom du Job ("Continuous Integration").
    runs-on: ubuntu-latest # Signifie que le job "Ci" est sera sera exécuté sur une machine virtuelle hébergée par GitHub, qui utilise une image contenant la dernière version stable de l'environnement Ubuntu supporté
    # Ce job (qui sera exécuté dans le pipeline) se lance sur une machine virtuelle Ubuntu, avec la dernière version disponible.
    # GitHub Actions utilise des images Docker pour exécuter les workflows, et `ubuntu-latest` spécifie que l'environnement d'exécution sera basé sur Ubuntu.

    services:
      postgres:
        image: postgres:12
        # Ici, un service PostgreSQL est configuré pour être utilisé dans le pipeline.
        # L'image `postgres:12` désigne la version 12 de PostgreSQL, utilisée pour tester l'application avec une base de données PostgreSQL.

        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        # Ces variables d'environnement injectent les paramètres nécessaires pour se connecter à la base de données PostgreSQL.
        # - `POSTGRES_DB` : nom de la base de données.
        # - `POSTGRES_USER` : utilisateur de la base de données.
        # - `POSTGRES_PASSWORD` : mot de passe de l'utilisateur.
        # Ces valeurs sont récupérées des `secrets` GitHub pour garantir qu'elles sont sécurisées.

        ports:
          - 5432:5432
        # Cette ligne expose le port 5432 de PostgreSQL dans le conteneur. C'est le port par défaut utilisé par PostgreSQL.
        # Cela permet à d'autres étapes dans le pipeline d'interagir avec la base de données en utilisant ce port.

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        # Cette étape utilise l'action GitHub `actions/checkout@v2` pour récupérer le code source de la branche sur laquelle le workflow est exécuté.
        # Cela permet au workflow d'accéder à tous les fichiers du projet pour les tester et les déployer.

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql
          tools: composer
        # Cette étape configure PHP dans l'environnement de CI.
        # - `php-version: '8.2'` définit la version de PHP à utiliser (ici, PHP 8.2).
        # - `extensions` liste les extensions PHP requises pour l'application, notamment `mbstring` pour la gestion des chaînes multibytes, `pdo` et `pdo_pgsql` pour la gestion de la base de données PostgreSQL, etc.
        # - `tools: composer` indique que l'outil Composer (un gestionnaire de dépendances PHP) sera installé.

      - name: Install dependencies
        run: composer install
        # Cette commande exécute `composer install` pour installer toutes les dépendances PHP définies dans le fichier `composer.json`.
        # Cela est essentiel pour préparer l'environnement de développement pour l'exécution de l'application.

      - name: Create .env.test from secrets
        run: |
          echo "KERNEL_CLASS='App\Kernel'" > .env.test
          echo "APP_SECRET='${{ secrets.APP_SECRET }}'" >> .env.test
          echo "SYMFONY_DEPRECATIONS_HELPER=999999" >> .env.test
          echo "PANTHER_APP_ENV=panther" >> .env.test
          echo "PANTHER_ERROR_SCREENSHOT_DIR=./var/error-screenshots" >> .env.test
          echo "DATABASE_URL=pgsql://postgres:root@127.0.0.1:5432/criti-pixel?charset=utf8" >> .env.test
        # Cette étape crée un fichier `.env.test` qui contient les variables d'environnement nécessaires à l'exécution des tests.
        # - `KERNEL_CLASS` définit la classe de noyau de l'application.
        # - `APP_SECRET` est une clé secrète utilisée pour les fonctions de sécurité.
        # - `DATABASE_URL` spécifie l'URL de connexion à la base de données PostgreSQL utilisée pour les tests, en utilisant les secrets GitHub pour garantir la sécurité.
        # Ces paramètres sont nécessaires pour que Symfony et les tests fonctionnent correctement dans l'environnement de test.

      - name: Drop and recreate the test database
        run: |
          export PGPASSWORD=${{ secrets.DB_PASSWORD }}
          php bin/console doctrine:database:create --if-not-exists --env=test
        # Cette étape supprime la base de données de test existante avec `doctrine:database:drop -f --if-exists` et la recrée avec `doctrine:database:create`.
        # Cela garantit que les tests sont exécutés sur une base de données propre à chaque exécution du pipeline.

      

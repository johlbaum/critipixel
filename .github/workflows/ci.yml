name: Continuous Integration

on:
  push:
    branches: [ ci-setup ]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:12
        options: --health-cmd="pg_isready -U postgres" --health-timeout=5s --health-retries=3 --health-start-period=30s
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql
          tools: composer

      - name: Install dependencies
        run: composer install

      - name: Set up PostgreSQL connection in .env.test
        run: |
          cp .env.test .env
          sed -i 's/DB_CONNECTION=postgres/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=localhost/' .env
          sed -i 's/DB_PORT=5432/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=your_database/DB_DATABASE=test_db/' .env
          sed -i 's/DB_USERNAME=your_username/DB_USERNAME=postgres/' .env
          sed -i 's/DB_PASSWORD=your_password/DB_PASSWORD=password/' .env

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate -n --env=test

      - name: Run tests
        run: php bin/phpunit

      - name: Static analysis
        run: php vendor/bin/phpstan

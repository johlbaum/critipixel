name: Continuous Integration

on:
  push:
    branches: [ ci-setup ]
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, pdo, pdo_pgsql
          tools: composer

      - name: Install dependencies
        run: composer install

      - name: Create .env.test from secrets
        run: |
          echo "KERNEL_CLASS='App\Kernel'" > .env.test
          echo "APP_SECRET='${{ secrets.APP_SECRET }}'" >> .env.test
          echo "DATABASE_URL=pgsql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:5432/${{ secrets.DB_NAME }}_test?charset=utf8" >> .env.test

      # Suppression de la double création de la base de données
      # On suppose que la base de données est déjà disponible grâce au service PostgreSQL
      # et que les migrations vont s'exécuter correctement sur celle-ci.

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate -n --env=test

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load -n --purge-with-truncate --env=test

      - name: Compile assets (Sass)
        run: php bin/console sass:build

      - name: Run tests
        run: php bin/phpunit

      - name: Static analysis
        run: php vendor/bin/phpstan

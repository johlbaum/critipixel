name: Continuous Integration
# Le nom du workflow.

on:
  push:
    branches: [ ci-setup ]
    # Ce workflow est déclenché lorsqu'un "push"" est effectué sur la branche "ci-setup".

jobs:
  ci:  # Le nom du Job ("Continuous Integration").
    runs-on: ubuntu-latest  # Le job sera exécuté sur une machine virtuelle Ubuntu (dernière version stable).

    services:
      postgres:
        image: postgres:12
        # Configuration du service PostgreSQL avec l'image "postgres:12" pour effectuer des tests avec une base de données PostgreSQL.

        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # Les variables d'environnement sont utilisées pour définir les informations de connexion à la base de données PostgreSQL.

        ports:
          - 5432:5432
          # Expose le port 5432 du service PostgreSQL pour permettre les connexions à la base de données depuis le pipeline.

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        # Cette étape récupère le code source de la branche déclenchante à l'aide de l'action GitHub `actions/checkout@v2`.
        # Elle permet au pipeline d'accéder aux fichiers du projet pour les tests et la construction.

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql
          tools: composer
        # Cette étape configure PHP avec la version spécifiée (ici 8.2).
        # Les extensions nécessaires sont ajoutées pour assurer que l'application fonctionne correctement avec PostgreSQL et autres fonctionnalités.
        # Composer est installé pour gérer les dépendances PHP.

      - name: Install dependencies
        run: composer install
        # Installe les dépendances PHP définies dans "composer.json" pour préparer l'environnement à l'exécution de l'application.

      - name: Create .env.test from secrets
        run: |
          echo "KERNEL_CLASS='App\Kernel'" > .env.test
          echo "APP_SECRET='${{ secrets.APP_SECRET }}'" >> .env.test
          echo "SYMFONY_DEPRECATIONS_HELPER=999999" >> .env.test
          echo "PANTHER_APP_ENV=panther" >> .env.test
          echo "PANTHER_ERROR_SCREENSHOT_DIR=./var/error-screenshots" >> .env.test
          echo "DATABASE_URL=pgsql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@localhost:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?charset=utf8" >> .env.test
        # Cette étape crée un fichier ".env.test" pour définir les variables d'environnement spécifiques à l'environnement de test.
        # Ces variables incluent la configuration de la base de données, les paramètres de sécurité et autres nécessaires pour Symfony.

      - name: Drop and recreate the test database
        run: |
          export PGPASSWORD=${{ secrets.DB_PASSWORD }}
          php bin/console doctrine:database:drop -f --if-exists --env=test
          php bin/console doctrine:database:create --env=test
        # Supprime la base de données de test existante (si elle existe) et la recrée pour garantir que les tests démarrent sur une base propre.

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate -n --env=test
        # Applique les migrations de base de données pour mettre à jour la structure de la base de données.
        # L'option "-n" empêche la confirmation manuelle pendant l'exécution des migrations.

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load -n --purge-with-truncate --env=test
        # Charge les fixtures dans la base de données de test.
        # "--purge-with-truncate" vide la base de données avant de charger les nouvelles données.

      - name: Compile assets (Sass)
        run: php bin/console sass:build
        # Compile les fichiers Sass en fichiers CSS pour le front-end de l'application.

      - name: Run tests
        run: php bin/phpunit
        # Exécute les tests.

      - name: Run phpstan
        run: php vendor/bin/phpstan
        # Exécute PHPStan.

      - name: Apply code fixes with PHP CS Fixer
        run: php vendor/bin/php-cs-fixer fix --diff
